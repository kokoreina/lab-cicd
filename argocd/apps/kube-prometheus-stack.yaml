apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true

        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: "smtp.gmail.com:587"
              smtp_from: "nguyentanhuy46205@gmail.com"
              smtp_auth_username: "nguyentanhuy46205@gmail.com"
              smtp_auth_password_file: "/etc/alertmanager/secrets/alertmanager-gmail-auth/password"
              smtp_require_tls: true
            route:
              receiver: "gmail"
              group_by: ["alertname", "namespace"]
              group_wait: 10s
              group_interval: 1m
              repeat_interval: 5m
            receivers:
              - name: "gmail"
                email_configs:
                  - to: "nguyentanhuy46205@gmail.com"
                    send_resolved: true
          alertmanagerSpec:
            replicas: 1
            secrets:
              - alertmanager-gmail-auth

        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
