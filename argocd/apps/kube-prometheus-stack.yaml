apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true

        alertmanager:
          enabled: true
          alertmanagerSpec:
            secrets:
              - alertmanager-gmail-auth
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: smtp.gmail.com:587
              smtp_from: nguyentanhuy46205@gmail.com
              smtp_auth_username: nguyentanhuy46205@gmail.com
              smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-gmail-auth/password
              smtp_require_tls: true
            route:
              receiver: gmail
              group_by:
                - alertname
                - namespace
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 1h
            receivers:
              - name: gmail
                email_configs:
                  - to: nguyentanhuy46205@gmail.com
                    send_resolved: true

        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
