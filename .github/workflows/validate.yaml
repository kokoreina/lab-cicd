name: Validate Kubernetes YAML

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate YAML schemas
        run: |
          kubeconform -strict -summary -ignore-missing-schemas k8s/*.yaml argocd/*.yaml argocd/apps/*.yaml
